<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Epollaris Web Chat</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #1e1e1e; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        #chat-box { width: 600px; height: 400px; background: #2d2d2d; border-radius: 8px; overflow-y: auto; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .msg { margin-bottom: 10px; line-height: 1.4; }
        .sender { font-weight: bold; color: #4CAF50; }
        .system { color: #888; font-style: italic; }
        #controls { display: flex; gap: 10px; width: 640px; }
        input { flex: 1; padding: 12px; border-radius: 4px; border: none; background: #3d3d3d; color: white; outline: none; font-size: 16px;}
        button { padding: 12px 20px; border: none; border-radius: 4px; background: #4CAF50; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #45a049; }
    </style>
</head>
<body>

    <h2>🚀 Epollaris Web Chat</h2>
    <div id="chat-box"></div>
    
    <div id="controls">
        <input type="text" id="msg-input" placeholder="Choisissez un pseudo et tapez Entrée..." autocomplete="off" autofocus>
        <button id="send-btn">Envoyer</button>
    </div>

    <script>
        const ws = new WebSocket('ws://localhost:8081');
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        
        let username = null;

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = 'msg';
            if (sender === "Server") {
                div.innerHTML = `<span class="system">[Système] ${text}</span>`;
            } else {
                div.innerHTML = `<span class="sender">[${sender}] :</span> ${text}`;
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        ws.onopen = () => appendMessage("Server", "Connecté au Proxy Node.js.");
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            appendMessage(data.sender, data.text);
        };
        ws.onclose = () => appendMessage("Server", "Déconnecté du serveur.");

        function sendMessage() {
            const val = input.value.trim();
            if (!val) return;

            if (!username) {
                username = val;
                ws.send(JSON.stringify({ type: 'login', username: username }));
                input.placeholder = "Tapez votre message...";
            } else {
                ws.send(JSON.stringify({ type: 'message', username: username, text: val }));
                appendMessage(username, val);
            }
            input.value = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
