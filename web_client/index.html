<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TeleChat Web Chat</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #1e1e1e; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        #app-container { display: flex; gap: 20px; width: 860px; }
        #sidebar { width: 200px; background: #2d2d2d; border-radius: 8px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #sidebar h3 { margin-top: 0; color: #4CAF50; border-bottom: 1px solid #3d3d3d; padding-bottom: 10px; }
        .user-item { padding: 8px 0; color: #aaa; cursor: pointer; transition: 0.2s; }
        .user-item:hover { color: #fff; text-decoration: underline; }
        #main-chat { display: flex; flex-direction: column; width: 640px; }
        #chat-box { width: 100%; height: 400px; background: #2d2d2d; border-radius: 8px; overflow-y: auto; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); box-sizing: border-box;}
        .msg { margin-bottom: 10px; line-height: 1.4; }
        .sender { font-weight: bold; color: #4CAF50; }
        .system { color: #888; font-style: italic; }
        #controls { display: flex; gap: 10px; width: 100%; }
        input { flex: 1; padding: 12px; border-radius: 4px; border: none; background: #3d3d3d; color: white; outline: none; font-size: 16px;}
        button { padding: 12px 20px; border: none; border-radius: 4px; background: #4CAF50; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #45a049; }
    </style>
</head>
<body>

    <h2>🚀 TeleChat Web</h2>
    <div id="app-container">
        <div id="sidebar">
            <h3>En ligne</h3>
            <ul id="user-list" style="list-style: none; padding: 0; margin: 0;"></ul>
        </div>
        
        <div id="main-chat">
            <div id="chat-box"></div>
            <div id="controls">
                <input type="text" id="msg-input" placeholder="Choisissez un pseudo et tapez Entrée..." autocomplete="off" autofocus>
                <button id="send-btn">Envoyer</button>
            </div>
        </div>
    </div>

    <script>
        const ws = new WebSocket('ws://localhost:8081');
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        const userListEl = document.getElementById('user-list');
        
        let username = null;
        let onlineUsers = new Set();

        function updateSidebar() {
            userListEl.innerHTML = '';
            onlineUsers.forEach(user => {
                const li = document.createElement('li');
                li.className = 'user-item';
                
                if (user === username) {
                    li.innerHTML = `<strong>${user} (Vous)</strong>`;
                } else {
                    li.textContent = user;
                }
                
                li.onclick = () => {
                    input.value = `/msg ${user} `;
                    input.focus();
                };
                userListEl.appendChild(li);
            });
        }

        function appendMessage(sender, text) {
            if (sender === "Server" && text.startsWith("En ligne: ")) {
                const usersStr = text.replace("En ligne: ", "").trim();
                const usersArr = usersStr.split(" ");
                usersArr.forEach(u => {
                    if (u.length > 0) onlineUsers.add(u);
                });
                updateSidebar();
                return;
            }

            const div = document.createElement('div');
            div.className = 'msg';
            
            if (sender === "Server") {
                div.innerHTML = `<span class="system">[Système] ${text}</span>`;
                if (text.includes("joined")) {
                    onlineUsers.add(text.split(" ")[0]);
                    updateSidebar();
                } else if (text.includes("left")) {
                    onlineUsers.delete(text.split(" ")[0]);
                    updateSidebar();
                } else if (text.includes("renamed to")) {
                    const parts = text.trim().split(" renamed to ");
                    if (parts.length === 2) {
                        const oldName = parts[0];
                        const newName = parts[1];
                        onlineUsers.delete(oldName);
                        onlineUsers.add(newName);
                        if (username === oldName) username = newName;
                        updateSidebar();
                    }
                }
            } else {
                div.innerHTML = `<span class="sender">[${sender}] :</span> ${text}`;
            }
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        ws.onopen = () => appendMessage("Server", "Connecté au Proxy Node.js.");
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            appendMessage(data.sender, data.text);
        };
        ws.onclose = () => appendMessage("Server", "Déconnecté du serveur.");

        function sendMessage() {
            const val = input.value.trim();
            if (!val) return;

            if (!username) {
                username = val;
                ws.send(JSON.stringify({ type: 'login', username: username }));
                input.placeholder = "Tapez un message ou /join #salon...";
                
                onlineUsers.add(username);
                updateSidebar();

                setTimeout(() => {
                    ws.send(JSON.stringify({ type: 'message', username: username, text: '/users' }));
                }, 100);

            } else {
                ws.send(JSON.stringify({ type: 'message', username: username, text: val }));
                if (val !== '/users' && !val.startsWith('/nick ')) {
                    appendMessage(username, val);
                }
            }
            input.value = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
